<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tani Toko - Direct Farmer Marketplace{% endblock %}</title>
    <!-- Bootstrap 5 CSS & FontAwesome Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hero-section {
            background: linear-gradient(135deg, #198754 0%, #0d5132 100%);
            color: white;
            border-radius: 1rem;
        }
        .card-custom {
            border: none;
            border-radius: 0.75rem;
            transition: transform 0.2s;
        }
        .card-custom:hover {
            transform: translateY(-4px);
        }
        .bg-gradient-green { background: linear-gradient(45deg, #198754, #20c997); }
        .bg-gradient-blue { background: linear-gradient(45deg, #0d6efd, #0dcaf0); }
        .bg-gradient-orange { background: linear-gradient(45deg, #fd7e14, #ffc107); }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="/"><i class="fa-solid fa-wheat-awn me-2"></i>Tani Toko</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-2"><a class="nav-link" href="/"><i class="fa-solid fa-store me-1"></i>Katalog</a></li>
                    {% if session.get('logged_in') %}
                        <li class="nav-item me-2"><a class="nav-link" href="/dashboard"><i class="fa-solid fa-chart-line me-1"></i>Dashboard</a></li>
                        <li class="nav-item me-2"><a class="nav-link" href="/kelola_data"><i class="fa-solid fa-database me-1"></i>Kelola Data</a></li>
                        <li class="nav-item"><a href="/logout" class="btn btn-outline-light btn-sm rounded-pill px-3"><i class="fa-solid fa-right-from-bracket me-1"></i>Logout</a></li>
                    {% else %}
                        <li class="nav-item"><a href="/login" class="btn btn-light btn-sm text-success fw-bold rounded-pill px-3"><i class="fa-solid fa-user-lock me-1"></i>Admin Login</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="container my-4 flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white text-center py-3 border-top mt-auto shadow-sm">
        <p class="mb-0 text-muted small">&copy; 2026 <strong>Tani Toko</strong> - Menghubungkan Petani Lokal Langsung ke Konsumen.</p>
    </footer>

    <!-- Chart.js & Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
